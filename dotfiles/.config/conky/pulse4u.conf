    default_outline_color = 'white',
    default_shade_color = 'white',
    draw_borders = false,
    draw_graph_borders = true,
    draw_outline = false,
    draw_shades = false,
    use_xft = true,
    font = 'JetBrains Mono:size=11',
    gap_x = 40,
    gap_y = 50,
    minimum_height = 5,
    minimum_width = 5,
    net_avg_samples = 2,
    no_buffers = true,
    out_to_console = false,
    out_to_stderr = false,
    extra_newline = false,
    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 60,
    own_window_hints = 'undecorated,below,sticky,skip_taskbar,skip_pager',
    own_window_class = 'Conky',
    own_window_colour = '050810',   
    stippled_borders = 0,
    update_interval = 1.0,
    uppercase = false,
    use_spacer = 'none',
    show_graph_scale = false,
    show_graph_range = false,
    color1 = '8A2BE2',
    color2 = 'D48A00',
    color3 = 'E8F0FF',

};

conky.text = [[
${alignc}${color3}${font JetBrains Mono:size=28}${execpi 1 LC_TIME=en_US.UTF-8 date "+%I:%M %p"}${font}
${alignc}${color3}${font JetBrains Mono:size=12}${execpi 60 LC_TIME=en_US.UTF-8 date "+%A, %B %d"}${font}

${color1}CPU ${color3}${cpu}%${color1} ${cpubar 6,180}
${color1}RAM ${color3}${memperc}%${color1} ${membar 6,180}

${alignc}${color2}Uptime: ${color3}${uptime_short}
]];
